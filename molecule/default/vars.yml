---

awx_container: "awx_credentials-olam8-node1"
awx_credentials_identifier: awx-1
awx_credentials_dest_root: "/tmp/xxx"
awx_credentials_awxkit: 24.6.1

awx_credentials:
  api:
    url: https://127.0.0.1
    user: admin
    password: "Admin123!"
    validate_certs: False
  db:
    host: 127.0.0.1
    port: '5432'
    name: awx
    user: awx
    password: awx
    secret: "{{ lookup('pipe', 'docker exec ' + awx_container + ' cat /etc/tower/SECRET_KEY') }}"

awx_resources:
  organizations:
    - name: org1
  credentials:
    - name: cred1
      credential_type: Machine
      organization: org1
      inputs:
        username: joe
        password: secret
    - name: cred2
      credential_type: Machine
      organization: org1
      inputs:
        username: jane
        password: topsecret
